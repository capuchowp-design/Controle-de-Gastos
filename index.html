async function loadCloud(){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{"X-Master-Key":API_KEY}});
    if(r.ok)return(await r.json()).record||{users:{}};
  }catch(err){}
  return{users:{}};
}
async function saveCloud(data){
  const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify(data)
  });
  if(!r.ok)throw new Error("Erro ao salvar");
  return r.json();
}

function GoalMeter({total,goal,dark}){
  if(!goal||goal<=0)return null;
  const pct=Math.min((total/goal)*100,100);
  const over=total>goal;
  const overPct=over?((total-goal)/goal*100).toFixed(1):null;
  let barColor,bgColor,txtColor,label;
  if(pct<60){barColor="#10b981";bgColor=dark?"#064e3b22":"#ecfdf5";txtColor="#059669";label="✅ Dentro do limite";}
  else if(pct<85){barColor="#f59e0b";bgColor=dark?"#78350f22":"#fffbeb";txtColor="#d97706";label="⚠️ Atenção!";}
  else if(pct<100){barColor="#f97316";bgColor=dark?"#7c2d1222":"#fff7ed";txtColor="#ea580c";label="🚨 Quase no limite!";}
  else{barColor="#dc2626";bgColor=dark?"#7f1d1d22":"#fef2f2";txtColor="#dc2626";label=`🔴 ULTRAPASSADO! +${overPct}%`;}

  return e("div",{style:{background:bgColor,border:`2px solid ${over?"#f87171":"transparent"}`,borderRadius:16,padding:16,marginBottom:24}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
      e("div",{style:{display:"flex",alignItems:"center",gap:8}},
        e(Ico,{path:PATHS.target,size:18,color:"#6366f1"}),
        e("span",{style:{fontWeight:600,fontSize:14,color:dark?"#e5e7eb":"#374151"}},"Meta de Gastos")
      ),
      e("span",{style:{fontWeight:700,fontSize:13,color:txtColor}},label)
    ),
    e("div",{style:{background:dark?"#374151":"#e5e7eb",borderRadius:999,height:20,overflow:"hidden"}},
      e("div",{className:pct>=85?"pulse":"",style:{width:`${pct}%`,height:"100%",background:barColor,borderRadius:999,transition:"width .5s",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:6}},
        pct>15?e("span",{style:{color:"#fff",fontSize:11,fontWeight:700}},pct.toFixed(0)+"%"):null
      )
    ),
    e("div",{style:{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:13}},
      e("span",{style:{color:dark?"#9ca3af":"#6b7280"}},["Gasto: ",e("strong",{key:"g",style:{color:txtColor}},fmt(total))]),
      e("span",{style:{color:dark?"#9ca3af":"#6b7280"}},["Meta: ",e("strong",{key:"m",style:{color:dark?"#e5e7eb":"#374151"}},fmt(goal))])
    ),
    over?e("div",{style:{textAlign:"center",marginTop:8}},
      e("span",{style:{color:"#dc2626",fontWeight:700,fontSize:13}},"Excedeu em "+fmt(total-goal))
    ):null
  );
}

function App(){
  const [screen,setScreen]=useState("login"); // login | app
  const [dark,setDark]=useState(false);
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState("");
  const [emailInput,setEmailInput]=useState("");
  const [passInput,setPassInput]=useState("");
  const [user,setUser]=useState("");
  const [expenses,setExpenses]=useState([]);
  const [cycleStart,setCycleStart]=useState(null);
  const [goal,setGoal]=useState(0);
  const [goalInput,setGoalInput]=useState("");
  const [editingGoal,setEditingGoal]=useState(false);
  const [input,setInput]=useState("");
  const [dateInput,setDateInput]=useState("");
  const [showDatePicker,setShowDatePicker]=useState(false);
  const [showReport,setShowReport]=useState(false);

  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),3500)};

  useEffect(()=>{
    const d=localStorage.getItem("darkMode")==="true";
    setDark(d);
    const u=localStorage.getItem("currentUser");
    if(u){setUser(u);loadUser(u);}
  },[]);

  const loadUser=async u=>{
    setLoading(true);
    try{
      const db=await loadCloud();
      if(db.users?.[u]){
        const ud=db.users[u];
        setExpenses(ud.expenses||[]);
        setCycleStart(ud.cycleStart||new Date().toISOString());
        setGoal(ud.monthlyGoal||0);
        setScreen("app");
      }else{
        const now=new Date().toISOString();
        await saveCloud({...db,users:{...db.users,[u]:{password:"",expenses:[],cycleStart:now,monthlyGoal:0}}});
        setCycleStart(now);setExpenses([]);setGoal(0);setScreen("app");
      }
    }catch{flash("⚠️ Erro ao carregar dados.")}
    finally{setLoading(false);}
  };

  const doLogin=async()=>{
    if(!emailInput.trim()||!passInput.trim()){flash("⚠️ Preencha e-mail e senha");return;}
    setLoading(true);
    try{
      const db=await loadCloud();
      if(db.users?.[emailInput]){
        if(db.users[emailInput].password===passInput){
          setUser(emailInput);localStorage.setItem("currentUser",emailInput);
          const ud=db.users[emailInput];
          setExpenses(ud.expenses||[]);setCycleStart(ud.cycleStart||new Date().toISOString());setGoal(ud.monthlyGoal||0);
          setScreen("app");flash("✅ Login realizado!");
        }else{flash("⚠️ Senha incorreta");}
      }else{
        const now=new Date().toISOString();
        await saveCloud({...db,users:{...db.users,[emailInput]:{password:passInput,expenses:[],cycleStart:now,monthlyGoal:0}}});
        setUser(emailInput);localStorage.setItem("currentUser",emailInput);
        setCycleStart(now);setExpenses([]);setGoal(0);setScreen("app");flash("✅ Conta criada!");
      }
    }catch{flash("⚠️ Erro de conexão.")}
    finally{setLoading(false);setPassInput("");}
  };

  const logout=()=>{
    setScreen("login");setUser("");setExpenses([]);setCycleStart(null);setGoal(0);
    localStorage.removeItem("currentUser");
  };

  const parseExpense=s=>{
    const m=s.trim().match(/^(.+?)\s*(?:R?\$|)\s*(\d+(?:[.,]\d{1,2})?)$/i);
    if(m)return{category:m[1].trim().toLowerCase(),value:parseFloat(m[2].replace(",","."))};
    return null;
  };

  const addExpense=async()=>{
    if(!input.trim())return;
    const p=parseExpense(input);
    if(!p){flash("⚠️ Use: categoria valor  ex: mercado 45");return;}
    const date=dateInput?new Date(dateInput).toISOString():new Date().toISOString();
    const item={id:Date.now().toString(),...p,date,user};
    try{
      const db=await loadCloud();
      const ud=db.users[user];
      await saveCloud({...db,users:{...db.users,[user]:{...ud,expenses:[...(ud.expenses||[]),item]}}});
      setExpenses(prev=>[...prev,item]);
      flash(`✅ ${p.category} — ${fmt(p.value)}`);
      setInput("");setDateInput("");setShowDatePicker(false);
    }catch{flash("⚠️ Erro ao salvar.")}
  };

  const deleteExpense=async id=>{
    try{
      const db=await loadCloud();
      const ud=db.users[user];
      await saveCloud({...db,users:{...db.users,[user]:{...ud,expenses:ud.expenses.filter(ex=>ex.id!==id)}}});
      setExpenses(prev=>prev.filter(ex=>ex.id!==id));flash("✅ Removido!");
    }catch{flash("⚠️ Erro ao remover.")}
  };

  const saveGoal=async()=>{
    const v=parseFloat(goalInput.replace(",","."));
    if(isNaN(v)||v<0){flash("⚠️ Valor inválido");return;}
    try{
      const db=await loadCloud();
      await saveCloud({...db,users:{...db.users,[user]:{...db.users[user],monthlyGoal:v}}});
      setGoal(v);setEditingGoal(false);setGoalInput("");flash("✅ Meta: "+fmt(v));
    }catch{flash("⚠️ Erro ao salvar meta.")}
  };

  const newCycle=async()=>{
    if(!confirm("Iniciar novo ciclo? Os gastos atuais serão apagados."))return;
    try{
      const db=await loadCloud();const now=new Date().toISOString();
      await saveCloud({...db,users:{...db.users,[user]:{...db.users[user],expenses:[],cycleStart:now}}});
      setExpenses([]);setCycleStart(now);setShowReport(false);flash("✅ Novo ciclo!");
    }catch{flash("⚠️ Erro.")}
  };

  const printReport=()=>{
    let total2=0,byC={};
    expenses.forEach(ex=>{byC[ex.category]=(byC[ex.category]||0)+ex.value;total2+=ex.value;});
    const sorted2=Object.entries(byC).sort((a,b)=>b[1]-a[1]);
    const win=window.open("","_blank");
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatório</title>
    <style>body{font-family:Arial;padding:40px;max-width:800px;margin:0 auto}h1{color:#4F46E5;border-bottom:3px solid #4F46E5;padding-bottom:10px}
    .bar{background:#EEF2FF;padding:12px;border-radius:8px;margin:8px 0;border-left:4px solid #4F46E5}
    .total{background:#4F46E5;color:#fff;padding:16px;border-radius:8px;text-align:center;font-size:20px;margin:16px 0}
    table{width:100%;border-collapse:collapse;margin-top:16px}td,th{padding:8px;border-bottom:1px solid #eee;text-align:left}
    @media print{button{display:none}}</style></head><body>
    <h1>📊 Relatório — ${user}</h1>
    <p>Ciclo: ${fmtDate(cycleStart)} (${Math.floor((Date.now()-new Date(cycleStart))/86400000)} dias)</p>
    ${goal>0?`<p><strong>Meta: ${fmt(goal)}</strong> | Gasto: ${fmt(total2)} (${((total2/goal)*100).toFixed(1)}%)${total2>goal?` | <span style="color:red">Excedeu ${fmt(total2-goal)}</span>`:""}</p>`:""}
    <h2>Por Categoria</h2>
    ${sorted2.map(([cat,val])=>`<div class="bar"><b style="text-transform:capitalize">${cat}</b> — ${fmt(val)} (${((val/total2)*100).toFixed(1)}%)</div>`).join("")}
    <div class="total">Total: ${fmt(total2)}</div>
    <h2>Detalhamento</h2>
    <table><tr><th>Categoria</th><th>Valor</th><th>Data</th></tr>
    ${[...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(ex=>`<tr><td style="text-transform:capitalize">${ex.category}</td><td>${fmt(ex.value)}</td><td>${fmtDate(ex.date)}</td></tr>`).join("")}
    </table></body></html>`);
    win.document.close();win.print();
  };

  // Colors
  const bg=dark?"background:#111827":"background:linear-gradient(135deg,#eff6ff,#eef2ff)";
  const cardBg=dark?"#1f2937":"#ffffff";
  const cardShadow="0 4px 20px rgba(0,0,0,0.08)";
  const textColor=dark?"#f9fafb":"#1f2937";
  const mutedColor=dark?"#9ca3af":"#6b7280";
  const inputStyle={width:"100%",padding:"12px 16px",border:`2px solid ${dark?"#374151":"#e5e7eb"}`,borderRadius:12,background:dark?"#374151":"#fff",color:textColor,fontSize:16,outline:"none",fontFamily:"inherit"};
  const cardStyle={background:cardBg,borderRadius:16,padding:24,boxShadow:cardShadow,marginBottom:24};
  const btnPrimary={background:"#4f46e5",color:"#fff",border:"none",borderRadius:12,padding:"14px 20px",fontSize:16,fontWeight:600,cursor:"pointer",width:"100%"};
  const btnDanger={background:"#ef4444",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6};
  const btnGhost={background:dark?"#374151":"#f3f4f6",color:dark?"#d1d5db":"#374151",border:"none",borderRadius:8,padding:"8px 14px",fontSize:14,cursor:"pointer"};

  // Stats
  let total=0;const byCategory={};
  expenses.forEach(ex=>{byCategory[ex.category]=(byCategory[ex.category]||0)+ex.value;total+=ex.value;});
  const sorted=Object.entries(byCategory).sort((a,b)=>b[1]-a[1]);
  const daysSince=cycleStart?Math.floor((Date.now()-new Date(cycleStart))/86400000):0;

  // ── Loading ──
  if(loading&&screen==="login") return e("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#eff6ff,#eef2ff)"}},
    e("div",{style:{...cardStyle,textAlign:"center",padding:40}},
      e("div",{className:"spin",style:{width:48,height:48,border:"4px solid #e5e7eb",borderTopColor:"#4f46e5",borderRadius:"50%",margin:"0 auto 16px"}}),
      e("p",{style:{color:"#6b7280"}},"Carregando...")
    )
  );

  // ── Login ──
  if(screen==="login") return e("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#eff6ff,#eef2ff)"}},
    e("div",{style:{...cardStyle,maxWidth:420,width:"100%",padding:32}},
      e("div",{style:{textAlign:"center",marginBottom:24}},
        e("div",{style:{background:"#4f46e5",borderRadius:16,display:"inline-flex",padding:16,marginBottom:16}},
          e(Ico,{path:PATHS.dollar,size:40,color:"#fff"})
        ),
        e("h1",{style:{fontSize:28,fontWeight:700,color:"#1f2937",marginBottom:4}},"Meu Controle"),
        e("p",{style:{color:"#6b7280"}},"Finanças Compartilhadas")
      ),
      e("div",{style:{marginBottom:16}},
        e("label",{style:{display:"block",fontSize:14,fontWeight:600,color:"#374151",marginBottom:6}},"E-mail"),
        e("input",{type:"email",value:emailInput,onChange:ev=>setEmailInput(ev.target.value),placeholder:"seu@email.com",style:inputStyle,onKeyDown:ev=>ev.key==="Enter"&&doLogin()})
      ),
      e("div",{style:{marginBottom:16}},
        e("label",{style:{display:"block",fontSize:14,fontWeight:600,color:"#374151",marginBottom:6}},"Senha"),
        e("input",{type:"password",value:passInput,onChange:ev=>setPassInput(ev.target.value),placeholder:"Digite sua senha",style:inputStyle,onKeyDown:ev=>ev.key==="Enter"&&doLogin()})
      ),
      msg?e("div",{style:{padding:"10px 14px",borderRadius:8,fontSize:14,marginBottom:12,background:msg.startsWith("✅")?"#f0fdf4":"#fffbeb",color:msg.startsWith("✅")?"#166534":"#92400e"}},msg):null,
      e("button",{onClick:doLogin,disabled:loading,style:btnPrimary},loading?"Carregando...":"Entrar / Criar Conta"),
      e("div",{style:{marginTop:16,padding:"12px 16px",borderRadius:10,background:"#eff6ff",fontSize:13,color:"#3730a3"}},
        e("p",{style:{fontWeight:600,marginBottom:4}},"💡 Dicas:"),
        e("p",null,"• Conta nova criada automaticamente"),
        e("p",null,"• Use no celular e no PC com a mesma conta"),
        e("p",null,"• Compartilhe com sua família")
      )
    )
  );

  // ── Main App ──
  return e("div",{style:{minHeight:"100vh",padding:16,[bg.split(":")[0]]:bg.split(":")[1]}},
    // Fix: apply background properly
    e("div",{style:{minHeight:"100vh",padding:0,position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:-1,...(dark?{background:"#111827"}:{background:"linear-gradient(135deg,#eff6ff,#eef2ff)"})}},null),
    e("div",{style:{maxWidth:720,margin:"0 auto",position:"relative"}},

      // Header
      e("div",{style:{...cardStyle}},
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
          e("div",{style:{display:"flex",alignItems:"center",gap:12}},
            e("div",{style:{background:"#4f46e5",borderRadius:12,padding:10,display:"inline-flex"}},
              e(Ico,{path:PATHS.dollar,size:28,color:"#fff"})
            ),
            e("div",null,
              e("h1",{style:{fontSize:22,fontWeight:700,color:textColor}},"Meu Controle"),
              e("p",{style:{fontSize:13,color:mutedColor}},"Olá, "+user.split("@")[0]+" 👋")
            )
          ),
          e("div",{style:{display:"flex",gap:8}},
            e("button",{onClick:()=>{const nd=!dark;setDark(nd);localStorage.setItem("darkMode",nd);},style:{...btnGhost,padding:10,borderRadius:10}},
              e(Ico,{path:dark?PATHS.sun:PATHS.moon,size:18,color:dark?"#fbbf24":"#6b7280"})
            ),
            e("button",{onClick:logout,style:btnDanger},
              e(Ico,{path:PATHS.logout,size:16,color:"#fff"}),"Sair"
            )
          )
        ),
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8,background:dark?"#312e81":"#eef2ff",padding:"10px 14px",borderRadius:10,flex:1,minWidth:200}},
            e(Ico,{path:PATHS.cal,size:16,color:"#6366f1"}),
            e("span",{style:{fontSize:13,color:dark?"#a5b4fc":"#4338ca"}},`Ciclo: ${daysSince} dias (desde ${fmtDate(cycleStart)})`)
          ),
          e("button",{onClick:newCycle,style:{background:"#f97316",color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}},
            e(Ico,{path:PATHS.reset,size:15,color:"#fff"}),"Novo Ciclo"
          )
        )
      ),

      // Goal meter
      e(GoalMeter,{total,goal,dark}),

      // Goal editor
      e("div",{style:cardStyle},
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8}},
            e(Ico,{path:PATHS.target,size:18,color:"#6366f1"}),
            e("span",{style:{fontWeight:600,color:textColor}},"Meta Mensal")
          ),
          !editingGoal?e("button",{onClick:()=>{setEditingGoal(true);setGoalInput(goal>0?goal.toFixed(2):"");},style:btnGhost},
            goal>0?"✏️ Editar":"+ Definir meta"
          ):null
        ),
        editingGoal?
          e("div",{style:{display:"flex",gap:8}},
            e("input",{type:"number",min:"0",step:"0.01",value:goalInput,onChange:ev=>setGoalInput(ev.target.value),placeholder:"Ex: 1500",onKeyDown:ev=>ev.key==="Enter"&&saveGoal(),style:{...inputStyle,width:"auto",flex:1},autoFocus:true}),
            e("button",{onClick:saveGoal,style:{background:"#4f46e5",color:"#fff",border:"none",borderRadius:10,padding:"10px 18px",fontWeight:600,cursor:"pointer"}},"Salvar"),
            e("button",{onClick:()=>setEditingGoal(false),style:btnGhost},"✕")
          ):
          e("p",{style:{fontSize:14,color:mutedColor}},goal>0?`Meta: ${fmt(goal)} / mês`:'Nenhuma meta — clique em "+ Definir meta"')
      ),

      // Add expense
      e("div",{style:cardStyle},
        e("label",{style:{display:"block",fontSize:14,fontWeight:600,color:textColor,marginBottom:8}},"💸 Lançar despesa"),
        e("input",{type:"text",value:input,onChange:ev=>setInput(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&addExpense(),placeholder:"Ex: mercado 20  ou  ifood 35,50",style:{...inputStyle,fontSize:17,marginBottom:10}}),
        e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}},
          e("button",{onClick:()=>setShowDatePicker(d=>!d),style:{...btnGhost,display:"flex",alignItems:"center",gap:6,fontSize:13}},
            e(Ico,{path:PATHS.clock,size:14,color:mutedColor}),
            dateInput?"Data: "+fmtDate(new Date(dateInput).toISOString()):"Adicionar data passada"
          ),
          dateInput?e("button",{onClick:()=>{setDateInput("");setShowDatePicker(false);},style:{color:"#ef4444",background:"none",border:"none",cursor:"pointer",fontSize:13}},"✕ Limpar"):null
        ),
        showDatePicker?e("input",{type:"date",value:dateInput,onChange:ev=>setDateInput(ev.target.value),max:new Date().toISOString().split("T")[0],style:{...inputStyle,marginBottom:10}}):null,
        msg?e("div",{style:{padding:"10px 14px",borderRadius:8,fontSize:14,marginBottom:10,background:msg.startsWith("✅")?"#f0fdf4":"#fffbeb",color:msg.startsWith("✅")?"#166534":"#92400e"}},msg):null,
        e("button",{onClick:addExpense,style:btnPrimary},"Adicionar Despesa")
      ),

      // Stats
      expenses.length>0?e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}},
        [{label:"Total",val:fmt(total),icon:PATHS.chart,color:"#ef4444"},
         {label:"Lançamentos",val:expenses.length,icon:PATHS.cal,color:"#3b82f6"},
         {label:"Categorias",val:sorted.length,icon:PATHS.pie,color:"#6366f1"}
        ].map(({label,val,icon,color})=>
          e("div",{key:label,style:{background:cardBg,borderRadius:12,padding:16,boxShadow:cardShadow,textAlign:"center"}},
            e(Ico,{path:icon,size:24,color}),
            e("p",{style:{fontSize:12,color:mutedColor,marginTop:4}}),
            e("p",{style:{fontSize:label==="Total"?15:18,fontWeight:700,color:textColor}},val),
            e("p",{style:{fontSize:11,color:mutedColor}},label)
          )
        )
      ):null,

      // Report buttons
      expenses.length>0?e("div",{style:{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}},
        e("button",{onClick:()=>setShowReport(r=>!r),style:{...btnPrimary,flex:1,minWidth:180,background:"linear-gradient(135deg,#4f46e5,#7c3aed)"}},
          showReport?"👁️ Ocultar Relatório":"📊 Ver Relatório"
        ),
        e("button",{onClick:printReport,style:{background:"#059669",color:"#fff",border:"none",borderRadius:12,padding:"14px 20px",fontSize:15,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:8}},
          e(Ico,{path:PATHS.download,size:18,color:"#fff"}),"PDF"
        )
      ):null,

      // Report
      showReport&&expenses.length>0?e("div",{style:cardStyle},
        e("h2",{style:{fontSize:20,fontWeight:700,color:textColor,marginBottom:20}},"📊 Por Categoria"),
        sorted.map(([cat,val])=>{
          const pct=(val/total)*100;
          return e("div",{key:cat,style:{marginBottom:16}},
            e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
              e("span",{style:{fontWeight:600,color:textColor,textTransform:"capitalize"}},cat),
              e("span",{style:{fontWeight:700,color:textColor}},fmt(val))
            ),
            e("div",{style:{background:dark?"#374151":"#e5e7eb",borderRadius:999,height:10}},
              e("div",{className:"bar",style:{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:999}})
            ),
            e("p",{style:{fontSize:12,color:mutedColor,textAlign:"right",marginTop:2}},pct.toFixed(1)+"% do total")
          );
        }),
        e("div",{style:{borderTop:`2px solid ${dark?"#374151":"#e5e7eb"}`,paddingTop:16,display:"flex",justifyContent:"space-between"}},
          e("span",{style:{fontSize:18,fontWeight:700,color:textColor}},"Total:"),
          e("span",{style:{fontSize:18,fontWeight:700,color:"#4f46e5"}},fmt(total))
        )
      ):null,

      // Transactions
      expenses.length>0?e("div",{style:cardStyle},
        e("h2",{style:{fontSize:20,fontWeight:700,color:textColor,marginBottom:16}},"Lançamentos"),
        e("div",{style:{maxHeight:400,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}},
          [...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(ex=>
            e("div",{key:ex.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:dark?"#374151":"#f9fafb",borderRadius:10}},
              e("div",null,
                e("p",{style:{fontWeight:600,color:textColor,textTransform:"capitalize"}}),
                e("p",{style:{fontWeight:600,color:textColor,textTransform:"capitalize",fontSize:15}},ex.category),
                e("p",{style:{fontSize:12,color:mutedColor}},fmtDate(ex.date)+" · "+ex.user.split("@")[0])
              ),
              e("div",{style:{display:"flex",alignItems:"center",gap:10}},
                e("span",{style:{fontWeight:700,color:"#ef4444",fontSize:16}},fmt(ex.value)),
                e("button",{onClick:()=>deleteExpense(ex.id),style:{background:"none",border:"none",cursor:"pointer",padding:6,borderRadius:6,color:"#ef4444"}},
                  e(Ico,{path:PATHS.trash,size:16,color:"#ef4444"})
                )
              )
            )
          )
        )
      ):e("div",{style:{...cardStyle,textAlign:"center",padding:48}},
        e(Ico,{path:PATHS.dollar,size:48,color:mutedColor}),
        e("h3",{style:{fontSize:18,fontWeight:600,color:mutedColor,marginTop:12}},"Nenhum lançamento"),
        e("p",{style:{fontSize:14,color:mutedColor,marginTop:4}},'Exemplo: "mercado 45" ou "ifood 32,50"')
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App,null));
</script>
</body>
</html>
