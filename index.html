// ── GoalBar component ────────────────────────────────────────────────────────
function GoalBar({label,icon,total,goal,dark,color}){
  if(!goal||goal<=0)return null;
  const pct=Math.min((total/goal)*100,100);
  const over=total>goal;
  const overPct=over?((total-goal)/goal*100).toFixed(1):null;

  let barCol,bgCol,txtCol,status;
  if(pct<60){barCol=color||"#10b981";bgCol=dark?"rgba(6,78,59,.25)":"#ecfdf5";txtCol="#059669";status="✅ OK";}
  else if(pct<85){barCol="#f59e0b";bgCol=dark?"rgba(120,53,15,.25)":"#fffbeb";txtCol="#d97706";status="⚠️ Atenção";}
  else if(pct<100){barCol="#f97316";bgCol=dark?"rgba(124,45,18,.25)":"#fff7ed";txtCol="#ea580c";status="🚨 Quase!";}
  else{barCol="#dc2626";bgCol=dark?"rgba(127,29,29,.25)":"#fef2f2";txtCol="#dc2626";status=`🔴 +${overPct}%`;}

  return h("div",{style:{background:bgCol,border:`2px solid ${over?"#f87171":"transparent"}`,borderRadius:12,padding:"12px 14px",marginBottom:12}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
      h("div",{style:{display:"flex",alignItems:"center",gap:6}},
        h(Ico,{path:icon,size:16,color:barCol}),
        h("span",{style:{fontWeight:600,fontSize:13,color:dark?"#e5e7eb":"#374151"}},label)
      ),
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("span",{style:{fontSize:12,fontWeight:700,color:txtCol}},status),
        h("span",{style:{fontSize:12,color:dark?"#9ca3af":"#6b7280"}},fmtR(total)+" / "+fmtR(goal))
      )
    ),
    h("div",{style:{background:dark?"#374151":"#e5e7eb",borderRadius:999,height:14,overflow:"hidden"}},
      h("div",{style:{width:`${pct}%`,height:"100%",background:barCol,borderRadius:999,transition:"width .5s",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}},
        pct>12?h("span",{style:{color:"#fff",fontSize:10,fontWeight:700}},pct.toFixed(0)+"%"):null
      )
    ),
    over?h("div",{style:{marginTop:6,textAlign:"right"}},
      h("span",{style:{color:"#dc2626",fontWeight:700,fontSize:12}},"Excedeu "+fmtR(total-goal))
    ):null
  );
}

            autoFocus:true}),
          h("button",{onClick:()=>{onSave(parseFloat(inp.replace(",",".")));setEditing(false);},style:{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:600,cursor:"pointer",fontSize:13}},"OK"),
          h("button",{onClick:()=>setEditing(false),style:btnGhost},"✕")
        )
      : h("div",{style:{display:"flex",alignItems:"center",gap:8}},
          h("span",{style:{fontWeight:600,fontSize:14,color:textColor}},value>0?fmtR(value):"—"),
          h("button",{onClick:()=>{setEditing(true);setInp(value>0?value.toFixed(2):"");},style:{...btnGhost,fontSize:12}},
            value>0?"✏️ Editar":"+ Definir")
        )
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("login");
  const [dark,setDark]=useState(false);
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState("");
  const [emailInput,setEmailInput]=useState("");
  const [passInput,setPassInput]=useState("");
  const [user,setUser]=useState("");

  // expenses: {id, category, value, date, user, type:"debit"|"credit", creditCycle:"current"|"next"}
  const [expenses,setExpenses]=useState([]);
  const [cycleStart,setCycleStart]=useState(null);
  const [creditClosedAt,setCreditClosedAt]=useState(null); // when current credit cycle was last closed

  // goals
  const [goalDebit,setGoalDebit]=useState(0);
  const [goalCredit,setGoalCredit]=useState(0);

  // add expense form
  const [input,setInput]=useState("");
  const [dateInput,setDateInput]=useState("");
  const [showDatePicker,setShowDatePicker]=useState(false);
  const [expType,setExpType]=useState("debit"); // "debit" | "credit"
  const [showReport,setShowReport]=useState(false);
  const [reportTab,setReportTab]=useState("all"); // "all"|"debit"|"credit"|"next"

  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),3500)};

  useEffect(()=>{
    const d=localStorage.getItem("darkMode")==="true";
    setDark(d);
    const u=localStorage.getItem("currentUser");
    if(u){setUser(u);loadUser(u);}
  },[]);

  const loadUser=async u=>{
    setLoading(true);
    try{
      const db=await loadCloud();
      if(db.users?.[u]){
        const ud=db.users[u];
        setExpenses(ud.expenses||[]);
        setCycleStart(ud.cycleStart||new Date().toISOString());
        setCreditClosedAt(ud.creditClosedAt||null);
        setGoalDebit(ud.goalDebit||0);
        setGoalCredit(ud.goalCredit||0);
        setScreen("app");
      }else{
        const now=new Date().toISOString();
        await saveCloud({...db,users:{...db.users,[u]:{password:"",expenses:[],cycleStart:now,creditClosedAt:null,goalDebit:0,goalCredit:0}}});
        setCycleStart(now);setExpenses([]);setGoalDebit(0);setGoalCredit(0);setCreditClosedAt(null);setScreen("app");
      }
    }catch{flash("⚠️ Erro ao carregar dados.")}
    finally{setLoading(false);}
  };

  const doLogin=async()=>{
    if(!emailInput.trim()||!passInput.trim()){flash("⚠️ Preencha e-mail e senha");return;}
    setLoading(true);
    try{
      const db=await loadCloud();
      if(db.users?.[emailInput]){
        if(db.users[emailInput].password===passInput){
          setUser(emailInput);localStorage.setItem("currentUser",emailInput);
          const ud=db.users[emailInput];
          setExpenses(ud.expenses||[]);setCycleStart(ud.cycleStart||new Date().toISOString());
          setCreditClosedAt(ud.creditClosedAt||null);
          setGoalDebit(ud.goalDebit||0);setGoalCredit(ud.goalCredit||0);
          setScreen("app");flash("✅ Login realizado!");
        }else{flash("⚠️ Senha incorreta");}
      }else{
        const now=new Date().toISOString();
        await saveCloud({...db,users:{...db.users,[emailInput]:{password:passInput,expenses:[],cycleStart:now,creditClosedAt:null,goalDebit:0,goalCredit:0}}});
        setUser(emailInput);localStorage.setItem("currentUser",emailInput);
        setCycleStart(now);setExpenses([]);setGoalDebit(0);setGoalCredit(0);setCreditClosedAt(null);setScreen("app");flash("✅ Conta criada!");
      }
    }catch{flash("⚠️ Erro de conexão.")}
    finally{setLoading(false);setPassInput("");}
  };

  const logout=()=>{
    setScreen("login");setUser("");setExpenses([]);setCycleStart(null);setGoalDebit(0);setGoalCredit(0);setCreditClosedAt(null);
    localStorage.removeItem("currentUser");
  };

  const saveGoal=async(field,v)=>{
    if(isNaN(v)||v<0){flash("⚠️ Valor inválido");return;}
    try{
      const db=await loadCloud();
      await saveCloud({...db,users:{...db.users,[user]:{...db.users[user],[field]:v}}});
      if(field==="goalDebit")setGoalDebit(v);
      else setGoalCredit(v);
      flash("✅ Meta salva: "+fmtR(v));
    }catch{flash("⚠️ Erro ao salvar meta.")}
  };

  const parseExpense=s=>{
    const m=s.trim().match(/^(.+?)\s*(?:R?\$|)\s*(\d+(?:[.,]\d{1,2})?)$/i);
    if(m)return{category:m[1].trim().toLowerCase(),value:parseFloat(m[2].replace(",","."))};
    return null;
  };

  const addExpense=async()=>{
    if(!input.trim())return;
    const p=parseExpense(input);
    if(!p){flash("⚠️ Use: categoria valor  ex: mercado 45");return;}
    const date=dateInput?new Date(dateInput).toISOString():new Date().toISOString();
    // For credit: determine if it's current or next cycle
    const creditCycle=expType==="credit"?(creditClosedAt?"next":"current"):null;
    const item={id:Date.now().toString(),...p,date,user,type:expType,creditCycle};
    try{
      const db=await loadCloud();
      const ud=db.users[user];
      await saveCloud({...db,users:{...db.users,[user]:{...ud,expenses:[...(ud.expenses||[]),item]}}});
      setExpenses(prev=>[...prev,item]);
      const typeLabel=expType==="credit"?(creditCycle==="next"?"💳 Próx. fatura":"💳 Crédito"):"🏦 Débito";
      flash(`✅ ${p.category} — ${fmtR(p.value)} [${typeLabel}]`);
      setInput("");setDateInput("");setShowDatePicker(false);
    }catch{flash("⚠️ Erro ao salvar.")}
  };

  const deleteExpense=async id=>{
    try{
      const db=await loadCloud();
      const ud=db.users[user];
      await saveCloud({...db,users:{...db.users,[user]:{...ud,expenses:ud.expenses.filter(ex=>ex.id!==id)}}});
      setExpenses(prev=>prev.filter(ex=>ex.id!==id));flash("✅ Removido!");
    }catch{flash("⚠️ Erro ao remover.")}
  };

  // Close credit cycle: mark all "current" credit as closed (archived),
  // and future credit expenses will be "next"
  const closeCreditCycle=async()=>{
    if(!confirm("Fechar fatura atual?\n\nOs gastos de crédito atuais ficam visíveis como 'Fatura atual' e os novos lançamentos entrarão como 'Próxima fatura'."))return;
    try{
      const now=new Date().toISOString();
      // Mark all current-cycle credit expenses as "closed"
      const updated=expenses.map(ex=>
        ex.type==="credit"&&ex.creditCycle==="current"
          ?{...ex,creditCycle:"closed"}
          :ex
      );
      const db=await loadCloud();
      await saveCloud({...db,users:{...db.users,[user]:{...db.users[user],expenses:updated,creditClosedAt:now}}});
      setExpenses(updated);setCreditClosedAt(now);
      flash("✅ Fatura fechada! Novos créditos já contam para o próximo mês.");
    }catch{flash("⚠️ Erro ao fechar fatura.")}
  };

  // Start new debit cycle (reset debit expenses)
  const newDebitCycle=async()=>{
    if(!confirm("Iniciar novo ciclo de débito? Os gastos de débito atuais serão apagados."))return;
    try{
      const now=new Date().toISOString();
      const updated=expenses.filter(ex=>ex.type!=="debit");
      const db=await loadCloud();
      await saveCloud({...db,users:{...db.users,[user]:{...db.users[user],expenses:updated,cycleStart:now}}});
      setExpenses(updated);setCycleStart(now);flash("✅ Novo ciclo de débito!");
    }catch{flash("⚠️ Erro.")}
  };

  // Promote next credit cycle to current (when new month starts after closing)
  const openNextCreditCycle=async()=>{
    if(!confirm("Iniciar novo mês de crédito?\n\nA fatura atual será arquivada e os gastos do 'Próximo mês' passam a ser o mês atual."))return;
    try{
      const updated=expenses
        .filter(ex=>!(ex.type==="credit"&&ex.creditCycle==="closed")) // remove old closed
        .map(ex=>ex.type==="credit"&&ex.creditCycle==="next"?{...ex,creditCycle:"current"}:ex); // promote next -> current
      const db=await loadCloud();
      await saveCloud({...db,users:{...db.users,[user]:{...db.users[user],expenses:updated,creditClosedAt:null}}});
      setExpenses(updated);setCreditClosedAt(null);flash("✅ Novo ciclo de crédito iniciado!");
    }catch{flash("⚠️ Erro.")}
  };

  // ── Computed values ──
  const debitExpenses=expenses.filter(ex=>ex.type==="debit");
  const creditCurrentExpenses=expenses.filter(ex=>ex.type==="credit"&&(ex.creditCycle==="current"||ex.creditCycle==="closed"));
  const creditNextExpenses=expenses.filter(ex=>ex.type==="credit"&&ex.creditCycle==="next");
  const totalDebit=debitExpenses.reduce((s,ex)=>s+ex.value,0);
  const totalCreditCurrent=creditCurrentExpenses.reduce((s,ex)=>s+ex.value,0);
  const totalCreditNext=creditNextExpenses.reduce((s,ex)=>s+ex.value,0);
  const totalAll=totalDebit+totalCreditCurrent;
  const goalTotal=goalDebit+goalCredit;
  const daysSince=cycleStart?Math.floor((Date.now()-new Date(cycleStart))/86400000):0;

  // ── Category breakdown by tab ──
  const getTabExpenses=tab=>{
    if(tab==="debit")return debitExpenses;
    if(tab==="credit")return creditCurrentExpenses;
    if(tab==="next")return creditNextExpenses;
    return [...debitExpenses,...creditCurrentExpenses];
  };
  const tabExpenses=getTabExpenses(reportTab);
  const tabTotal=tabExpenses.reduce((s,ex)=>s+ex.value,0);
  const byCategory={};
  tabExpenses.forEach(ex=>{byCategory[ex.category]=(byCategory[ex.category]||0)+ex.value;});
  const sorted=Object.entries(byCategory).sort((a,b)=>b[1]-a[1]);

  // ── Styles ──
  const cardBg=dark?"#1f2937":"#ffffff";
  const cardShadow="0 2px 16px rgba(0,0,0,.08)";
  const textColor=dark?"#f9fafb":"#1f2937";
  const mutedColor=dark?"#9ca3af":"#6b7280";
  const inputStyle={width:"100%",padding:"12px 16px",border:`2px solid ${dark?"#374151":"#e5e7eb"}`,borderRadius:12,background:dark?"#374151":"#fff",color:textColor,fontSize:16,outline:"none",fontFamily:"inherit"};
  const card={background:cardBg,borderRadius:16,padding:20,boxShadow:cardShadow,marginBottom:16};
  const btnPrimary={background:"#4f46e5",color:"#fff",border:"none",borderRadius:12,padding:"13px 20px",fontSize:16,fontWeight:600,cursor:"pointer",width:"100%"};
  const btnGhost={background:dark?"#374151":"#f3f4f6",color:dark?"#d1d5db":"#374151",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer"};

  // ── Loading screen ──
  if(loading&&screen==="login")return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#eff6ff,#eef2ff)"}},
    h("div",{style:{...card,textAlign:"center",padding:40}},
      h("div",{className:"spin",style:{width:48,height:48,border:"4px solid #e5e7eb",borderTopColor:"#4f46e5",borderRadius:"50%",margin:"0 auto 16px"}}),
      h("p",{style:{color:"#6b7280"}},"Carregando...")
    )
  );

  // ── Login screen ──
  if(screen==="login")return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#eff6ff,#eef2ff)"}},
    h("div",{style:{...card,maxWidth:420,width:"100%",padding:32}},
      h("div",{style:{textAlign:"center",marginBottom:24}},
        h("div",{style:{background:"#4f46e5",borderRadius:16,display:"inline-flex",padding:16,marginBottom:12}},
          h(Ico,{path:P.dollar,size:36,color:"#fff"})
        ),
        h("h1",{style:{fontSize:26,fontWeight:700,color:"#1f2937",marginBottom:4}},"Meu Controle"),
        h("p",{style:{color:"#6b7280"}},"Finanças Compartilhadas")
      ),
      h("div",{style:{marginBottom:14}},
        h("label",{style:{display:"block",fontSize:14,fontWeight:600,color:"#374151",marginBottom:6}},"E-mail"),
        h("input",{type:"email",value:emailInput,onChange:ev=>setEmailInput(ev.target.value),placeholder:"seu@email.com",style:inputStyle,onKeyDown:ev=>ev.key==="Enter"&&doLogin()})
      ),
      h("div",{style:{marginBottom:14}},
        h("label",{style:{display:"block",fontSize:14,fontWeight:600,color:"#374151",marginBottom:6}},"Senha"),
        h("input",{type:"password",value:passInput,onChange:ev=>setPassInput(ev.target.value),placeholder:"Sua senha",style:inputStyle,onKeyDown:ev=>ev.key==="Enter"&&doLogin()})
      ),
      msg?h("div",{style:{padding:"10px 14px",borderRadius:8,fontSize:14,marginBottom:10,background:msg.startsWith("✅")?"#f0fdf4":"#fffbeb",color:msg.startsWith("✅")?"#166534":"#92400e"}},msg):null,
      h("button",{onClick:doLogin,disabled:loading,style:btnPrimary},loading?"Carregando...":"Entrar / Criar Conta"),
      h("div",{style:{marginTop:14,padding:"12px 16px",borderRadius:10,background:"#eff6ff",fontSize:13,color:"#3730a3"}},
        h("p",{style:{fontWeight:600,marginBottom:4}},"💡 Dicas:"),
        h("p",null,"• Conta nova criada automaticamente"),
        h("p",null,"• Use no celular e PC com a mesma conta")
      )
    )
  );

  // ── Main App ──
  return h("div",{style:{position:"relative",minHeight:"100vh",paddingBottom:24}},
    // Background
    h("div",{style:{position:"fixed",inset:0,zIndex:-1,...(dark?{background:"#111827"}:{background:"linear-gradient(135deg,#eff6ff,#eef2ff)"})}}),
    h("div",{style:{maxWidth:680,margin:"0 auto",padding:"16px 12px"}},

      // ── Header ──
      h("div",{style:card},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10}},
            h("div",{style:{background:"#4f46e5",borderRadius:12,padding:10,display:"inline-flex"}},h(Ico,{path:P.dollar,size:24,color:"#fff"})),
            h("div",null,
              h("h1",{style:{fontSize:20,fontWeight:700,color:textColor}},"Meu Controle"),
              h("p",{style:{fontSize:12,color:mutedColor}},"Olá, "+user.split("@")[0]+" 👋")
            )
          ),
          h("div",{style:{display:"flex",gap:6}},
            h("button",{onClick:()=>{const nd=!dark;setDark(nd);localStorage.setItem("darkMode",nd);},style:{...btnGhost,padding:9,borderRadius:10}},
              h(Ico,{path:dark?P.sun:P.moon,size:17,color:dark?"#fbbf24":"#6b7280"})
            ),
            h("button",{onClick:logout,style:{background:"#ef4444",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}},
              h(Ico,{path:P.logout,size:15,color:"#fff"}),"Sair"
            )
          )
        ),
        // Cycle info row
        h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:6,background:dark?"#312e81":"#eef2ff",padding:"8px 12px",borderRadius:8,flex:1,minWidth:160,fontSize:12,color:dark?"#a5b4fc":"#4338ca"}},
            h(Ico,{path:P.cal,size:14,color:"#6366f1"}),
            "Débito: "+daysSince+" dias"
          ),
          creditClosedAt
            ?h("div",{style:{display:"flex",alignItems:"center",gap:6,background:dark?"#1e3a5f":"#dbeafe",padding:"8px 12px",borderRadius:8,flex:1,minWidth:160,fontSize:12,color:dark?"#93c5fd":"#1d4ed8"}},
              h(Ico,{path:P.credit,size:14,color:"#3b82f6"}),
              "Crédito fechado em "+fmtDate(creditClosedAt)
            )
            :h("div",{style:{display:"flex",alignItems:"center",gap:6,background:dark?"#064e3b22":"#ecfdf5",padding:"8px 12px",borderRadius:8,flex:1,minWidth:160,fontSize:12,color:dark?"#6ee7b7":"#047857"}},
              h(Ico,{path:P.credit,size:14,color:"#10b981"}),
              "Crédito: fatura aberta"
            )
        )
      ),

      // ── Goals Section ──
      h("div",{style:card},
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
          h(Ico,{path:P.target,size:18,color:"#6366f1"}),
          h("h2",{style:{fontSize:16,fontWeight:700,color:textColor}}),"Metas de Gasto"
        ),
        h("h2",{style:{fontSize:16,fontWeight:700,color:textColor,marginBottom:12}},
          h(Ico,{path:P.target,size:18,color:"#6366f1"})," Metas de Gasto"
        ),
        // Three bars
        h(GoalBar,{label:"Geral (Débito + Crédito)",icon:P.chart,total:totalAll,goal:goalTotal,dark,color:"#6366f1"}),
        h(GoalBar,{label:"Débito",icon:P.debit,total:totalDebit,goal:goalDebit,dark,color:"#3b82f6"}),
        h(GoalBar,{label:"Crédito (fatura atual)",icon:P.credit,total:totalCreditCurrent,goal:goalCredit,dark,color:"#8b5cf6"}),
        // Goal editors
        h("div",{style:{borderTop:`1px solid ${dark?"#374151":"#e5e7eb"}`,paddingTop:12,marginTop:4}},
          h(GoalEditor,{label:"Débito",icon:P.debit,value:goalDebit,onSave:v=>saveGoal("goalDebit",v),dark}),
          h(GoalEditor,{label:"Crédito",icon:P.credit,value:goalCredit,onSave:v=>saveGoal("goalCredit",v),dark}),
          h("p",{style:{fontSize:11,color:mutedColor,marginTop:6}},"Meta geral = débito + crédito automaticamente ("+fmtR(goalTotal)+")")
        )
      ),

      // ── Add Expense ──
      h("div",{style:card},
        h("label",{style:{display:"block",fontSize:14,fontWeight:600,color:textColor,marginBottom:8}},"💸 Lançar despesa"),
        h("input",{type:"text",value:input,onChange:ev=>setInput(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&addExpense(),
          placeholder:'Ex: mercado 20  ou  ifood 35,50',style:{...inputStyle,marginBottom:10}}),

        // Debit / Credit toggle
        h("div",{style:{display:"flex",gap:8,marginBottom:10}},
          h("button",{onClick:()=>setExpType("debit"),style:{flex:1,padding:"10px 0",borderRadius:10,border:`2px solid ${expType==="debit"?"#3b82f6":"transparent"}`,background:expType==="debit"?(dark?"#1e3a5f":"#dbeafe"):(dark?"#374151":"#f3f4f6"),color:expType==="debit"?(dark?"#93c5fd":"#1d4ed8"):(dark?"#9ca3af":"#6b7280"),fontWeight:600,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
            h(Ico,{path:P.debit,size:16,color:expType==="debit"?"#3b82f6":"#9ca3af"}),"🏦 Débito"
          ),
          h("button",{onClick:()=>setExpType("credit"),style:{flex:1,padding:"10px 0",borderRadius:10,border:`2px solid ${expType==="credit"?"#8b5cf6":"transparent"}`,background:expType==="credit"?(dark?"#2e1065":"#ede9fe"):(dark?"#374151":"#f3f4f6"),color:expType==="credit"?(dark?"#c4b5fd":"#6d28d9"):(dark?"#9ca3af":"#6b7280"),fontWeight:600,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
            h(Ico,{path:P.credit,size:16,color:expType==="credit"?"#8b5cf6":"#9ca3af"}),
            creditClosedAt?"💳 Crédito (próx. mês)":"💳 Crédito"
          )
        ),

        // Credit cycle notice
        expType==="credit"&&creditClosedAt
          ?h("div",{style:{background:dark?"rgba(139,92,246,.15)":"#ede9fe",border:"1px solid #8b5cf6",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:dark?"#c4b5fd":"#6d28d9"}},
            "⚠️ Fatura atual fechada — este lançamento entrará na próxima fatura"
          ):null,

        // Date picker
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}},
          h("button",{onClick:()=>setShowDatePicker(d=>!d),style:{...btnGhost,display:"flex",alignItems:"center",gap:5,fontSize:13}},
            h(Ico,{path:P.clock,size:13,color:mutedColor}),
            dateInput?"Data: "+fmtDate(new Date(dateInput).toISOString()):"+ Data passada"
          ),
          dateInput?h("button",{onClick:()=>{setDateInput("");setShowDatePicker(false);},style:{color:"#ef4444",background:"none",border:"none",cursor:"pointer",fontSize:13}},"✕"):null
        ),
        showDatePicker?h("input",{type:"date",value:dateInput,onChange:ev=>setDateInput(ev.target.value),max:new Date().toISOString().split("T")[0],style:{...inputStyle,marginBottom:10}}):null,

        msg?h("div",{style:{padding:"10px 14px",borderRadius:8,fontSize:14,marginBottom:10,background:msg.startsWith("✅")?"#f0fdf4":"#fffbeb",color:msg.startsWith("✅")?"#166534":"#92400e"}},msg):null,
        h("button",{onClick:addExpense,style:btnPrimary},"Adicionar Despesa")
      ),

      // ── Quick Stats ──
      expenses.length>0?h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}},
        [
          {label:"Geral",val:fmtR(totalAll),color:"#6366f1"},
          {label:"Débito",val:fmtR(totalDebit),color:"#3b82f6"},
          {label:"Crédito atual",val:fmtR(totalCreditCurrent),color:"#8b5cf6"},
        ].map(({label,val,color})=>
          h("div",{key:label,style:{background:cardBg,borderRadius:12,padding:"12px 10px",boxShadow:cardShadow,textAlign:"center"}},
            h("p",{style:{fontSize:11,color:mutedColor}}),
            h("p",{style:{fontSize:13,fontWeight:700,color,marginBottom:2}},val),
            h("p",{style:{fontSize:11,color:mutedColor}},label)
          )
        )
      ):null,

      // Next credit preview
      creditNextExpenses.length>0?h("div",{style:{...card,border:"2px solid #8b5cf6"}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}},
          h("div",{style:{display:"flex",alignItems:"center",gap:6}},
            h(Ico,{path:P.credit,size:16,color:"#8b5cf6"}),
            h("span",{style:{fontWeight:600,fontSize:14,color:dark?"#c4b5fd":"#6d28d9"}},"Próxima fatura")
          ),
          h("span",{style:{fontWeight:700,fontSize:15,color:"#8b5cf6"}},fmtR(totalCreditNext))
        ),
        h("p",{style:{fontSize:12,color:mutedColor,marginBottom:10}},creditNextExpenses.length+" lançamentos após o fechamento da fatura"),
        creditNextExpenses.slice(0,3).map(ex=>
          h("div",{key:ex.id,style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${dark?"#374151":"#f3f4f6"}`,fontSize:13}},
            h("span",{style:{color:textColor,textTransform:"capitalize"}},ex.category),
            h("span",{style:{color:"#8b5cf6",fontWeight:600}},fmtR(ex.value))
          )
        ),
        creditNextExpenses.length>3?h("p",{style:{fontSize:12,color:mutedColor,marginTop:6,textAlign:"center"}},"+ "+(creditNextExpenses.length-3)+" mais"):null
      ):null,

      // ── Cycle Controls ──
      h("div",{style:{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}},
        h("button",{onClick:newDebitCycle,style:{flex:1,minWidth:140,background:"#f97316",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
          h(Ico,{path:P.reset,size:15,color:"#fff"}),"Novo ciclo débito"
        ),
        creditClosedAt
          ?h("button",{onClick:openNextCreditCycle,style:{flex:1,minWidth:140,background:"#7c3aed",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
            h(Ico,{path:P.check,size:15,color:"#fff"}),"Abrir próx. fatura"
          )
          :h("button",{onClick:closeCreditCycle,style:{flex:1,minWidth:140,background:"#6d28d9",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
            h(Ico,{path:P.close,size:15,color:"#fff"}),"Fechar fatura crédito"
          )
      ),

      // ── Report / Transactions ──
      expenses.length>0?h("div",null,
        h("button",{onClick:()=>setShowReport(r=>!r),style:{...btnPrimary,marginBottom:10,background:"linear-gradient(135deg,#4f46e5,#7c3aed)"}},
          showReport?"👁️ Ocultar relatório":"📊 Ver relatório detalhado"
        ),

        showReport?h("div",{style:card},
          // Tabs
          h("div",{style:{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}},
            [["all","Geral"],["debit","Débito"],["credit","Crédito atual"],["next","Próx. fatura"]].map(([tab,lbl])=>
              h("button",{key:tab,onClick:()=>setReportTab(tab),style:{padding:"7px 14px",borderRadius:8,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",
                background:reportTab===tab?"#4f46e5":(dark?"#374151":"#e5e7eb"),
                color:reportTab===tab?"#fff":(dark?"#9ca3af":"#6b7280")}},lbl)
            )
          ),
          h("h3",{style:{fontSize:15,fontWeight:700,color:textColor,marginBottom:12}},
            "Total: "+fmtR(tabTotal)
          ),
          sorted.length===0?h("p",{style:{color:mutedColor,textAlign:"center",padding:16}},"Sem lançamentos nesta categoria"):
          sorted.map(([cat,val])=>{
            const pct=tabTotal>0?(val/tabTotal)*100:0;
            return h("div",{key:cat,style:{marginBottom:12}},
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                h("span",{style:{fontWeight:600,color:textColor,textTransform:"capitalize",fontSize:14}},cat),
                h("span",{style:{fontWeight:700,color:textColor,fontSize:14}},fmtR(val))
              ),
              h("div",{style:{background:dark?"#374151":"#e5e7eb",borderRadius:999,height:8}},
                h("div",{className:"bar",style:{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:999}})
              ),
              h("p",{style:{fontSize:11,color:mutedColor,textAlign:"right",marginTop:2}},pct.toFixed(1)+"%")
            );
          })
        ):null,

        // Transactions list with tab filter
        h("div",{style:card},
          h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
            h("h2",{style:{fontSize:16,fontWeight:700,color:textColor}},"Lançamentos"),
            h("div",{style:{display:"flex",gap:4}},
              [["all","Todos"],["debit","Déb"],["credit","Créd"],["next","Próx"]].map(([tab,lbl])=>
                h("button",{key:tab,onClick:()=>setReportTab(tab),style:{padding:"5px 10px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
                  background:reportTab===tab?"#4f46e5":(dark?"#374151":"#e5e7eb"),
                  color:reportTab===tab?"#fff":(dark?"#9ca3af":"#6b7280")}},lbl)
              )
            )
          ),
          h("div",{style:{maxHeight:400,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}},
            [...tabExpenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(ex=>{
              const isCredit=ex.type==="credit";
              const isNext=ex.creditCycle==="next";
              const isClosed=ex.creditCycle==="closed";
              const tagColor=isNext?"#8b5cf6":isCredit?(isClosed?"#6d28d9":"#7c3aed"):"#3b82f6";
              const tagLabel=isNext?"Próx.":isCredit?(isClosed?"Créd. fechado":"Créd."):"Déb.";
              return h("div",{key:ex.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:dark?"#374151":"#f9fafb",borderRadius:10}},
                h("div",{style:{flex:1}},
                  h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                    h("span",{style:{fontWeight:600,color:textColor,textTransform:"capitalize",fontSize:14}},ex.category),
                    h("span",{style:{fontSize:10,fontWeight:700,color:"#fff",background:tagColor,borderRadius:4,padding:"2px 6px"}},tagLabel)
                  ),
                  h("p",{style:{fontSize:11,color:mutedColor,marginTop:2}},fmtDate(ex.date)+" · "+ex.user.split("@")[0])
                ),
                h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  h("span",{style:{fontWeight:700,color:"#ef4444",fontSize:15}},fmtR(ex.value)),
                  h("button",{onClick:()=>deleteExpense(ex.id),style:{background:"none",border:"none",cursor:"pointer",padding:5,borderRadius:6,color:"#ef4444"}},
                    h(Ico,{path:P.trash,size:15,color:"#ef4444"})
                  )
                )
              );
            })
          )
        )
      ):h("div",{style:{...card,textAlign:"center",padding:40}},
        h(Ico,{path:P.dollar,size:44,color:mutedColor}),
        h("h3",{style:{fontSize:17,fontWeight:600,color:mutedColor,marginTop:10}},"Nenhum lançamento"),
        h("p",{style:{fontSize:13,color:mutedColor,marginTop:4}},'Ex: "mercado 45" ou "ifood 32,50"')
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App,null));

</script>
</body>
</html>
